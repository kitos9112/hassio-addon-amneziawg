---
name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from config.yaml
        id: meta
        run: |
          version="$(grep -E '^version:' amneziawg/config.yaml \
            | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing add-on version: ${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + aarch64)
        uses: docker/build-push-action@v6
        with:
          context: ./amneziawg
          file: ./amneziawg/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:19.0.0
          tags: |
            ghcr.io/${{ github.repository_owner }}/amneziawg:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/amneziawg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
