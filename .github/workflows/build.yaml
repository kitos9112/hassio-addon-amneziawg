---
name: Build image

# Reusable multi-arch build + push to GHCR. Called by deploy.yaml (on release)
# and release.yaml (manual), and runnable on its own for a manual rebuild.
on:
  workflow_call:
    inputs:
      version:
        description: Image tag to publish (e.g. 1.0.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to publish (e.g. 1.0.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push (amd64 + aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./amneziawg
          file: ./amneziawg/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:19.0.0
          tags: |
            ghcr.io/${{ github.repository_owner }}/amneziawg:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/amneziawg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
