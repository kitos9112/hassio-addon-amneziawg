---
configuration:
  server_port:
    name: Server UDP port
    description: >-
      UDP port AmneziaWG listens on. Default 51820. Ports below 1024 are
      allowed. Must not collide with another service on the host (e.g. AdGuard
      on 53). Forward this port on your router.
  endpoint_host:
    name: Endpoint host (required)
    description: >-
      Your public IP or DDNS hostname that clients connect to. Written into
      every client config as Endpoint = host:port. Leave nothing here and the
      add-on will refuse to start.
  endpoint_port:
    name: Endpoint port (external)
    description: >-
      External UDP port clients connect to, written into client configs as
      Endpoint = host:port. Set this only when your router forwards a different
      external port to the internal server_port (e.g. external 54 -> server_port
      51820). Leave blank to use server_port. Does not change the listen port.
  vpn_subnet:
    name: VPN subnet (CIDR)
    description: >-
      Private subnet for the tunnel. The server takes the first usable address
      (e.g. .1); clients are auto-assigned the rest.
  client_dns:
    name: Client DNS servers
    description: >-
      DNS server(s) pushed to clients. The default 1.1.1.1 works out of the box.
      To use a local resolver (AdGuard/Pi-hole on your HASS host), set its IP
      here AND allow your vpn_subnet in that resolver's client/allow-list -
      otherwise names won't resolve even though the tunnel is up.
  allowed_ips:
    name: Client AllowedIPs
    description: >-
      Ranges clients route through the tunnel. 0.0.0.0/0 = full tunnel (all
      IPv4 traffic exits via Home Assistant). Override per-client below.
  mtu:
    name: MTU
    description: Interface MTU. Lower to 1280 if you see fragmentation issues.
  persistent_keepalive:
    name: Persistent keepalive (s)
    description: >-
      Seconds between keepalive packets. 25 keeps NAT mappings alive; set 0 to
      disable.
  enable_nat:
    name: Enable NAT / masquerade
    description: >-
      Masquerade client traffic out the host's WAN interface so it reaches the
      internet. Disable only if you handle routing elsewhere.
  regenerate_clients:
    name: Regenerate client keys
    description: >-
      One-shot: rotate ALL client keys (and auto-generated obfuscation params)
      on next start. Set back to false afterwards or keys rotate every restart.
  qr_in_log:
    name: Show client QR in log
    description: >-
      Print a scannable QR for each client to the add-on log. OFF by default: the
      QR encodes the full client config INCLUDING its private key. Enable only for
      quick onboarding, never on a system whose logs you forward or share.
  server_private_key:
    name: Import server private key
    description: >-
      Paste a base64 AmneziaWG/WireGuard private key to adopt it as the SERVER
      identity. Used only when no server key is stored yet (or with key_import
      overwrite). Leave blank to keep the existing key or auto-generate. Stored
      in the add-on config and included in Home Assistant backups.
  key_export:
    name: Key export (one-shot)
    description: >-
      Enable to write the server + client keys and a portable backup bundle to
      the add-on config share (keys/ and amneziawg-backup.awg) on next start,
      then SET BACK to false. Set a passphrase to AES-encrypt the bundle. These
      files contain PRIVATE keys — protect or delete them after retrieval.
  key_import:
    name: Key import / restore (one-shot)
    description: >-
      Enable restore to import keys from amneziawg-restore.awg (placed in the
      add-on config share) on next start, then SET BACK to false. Provide the
      passphrase if the bundle was encrypted. overwrite=true also replaces keys
      that already exist — DANGER: this rotates the identity and breaks already
      enrolled clients until they receive new configs.
  obfuscation:
    name: Obfuscation (AmneziaWG)
    description: >-
      DPI-evasion settings. When enabled, clients MUST use the Amnezia app or
      awg — stock WireGuard clients cannot connect. Disable for plain
      WireGuard compatibility. Leave individual params empty to auto-generate.
  clients:
    name: Clients
    description: >-
      Declarative client list. Add a name to create a client; keys persist and
      are not rotated on restart. Optional fixed address and per-client
      AllowedIPs override. Optionally paste a per-client private_key/preshared_key
      to import existing keys (used only for empty slots unless key_import
      overwrite is set).
  log_level:
    name: Log level
    description: Controls add-on log verbosity.
network:
  "51820/udp": AmneziaWG listen port (forward on your router)
