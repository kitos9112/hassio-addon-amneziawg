---
name: Build image

# Reusable multi-arch build + push to GHCR, with keyless cosign signing and an
# SBOM attestation. Called by deploy.yaml (on release) and release.yaml (manual);
# also runnable on its own for a manual rebuild. Base image + upstream sources
# are digest/SHA-pinned in the Dockerfile, so no BUILD_FROM arg is passed here.
on:
  workflow_call:
    inputs:
      version:
        description: Image tag to publish (e.g. 1.0.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to publish (e.g. 1.0.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write  # keyless cosign signing/attestation via GitHub OIDC

jobs:
  build:
    name: Build, push, sign (amd64 + aarch64)
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/amneziawg
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ./amneziawg
          file: ./amneziawg/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false  # keep a clean 2-platform manifest for Supervisor
          tags: |
            ${{ env.IMAGE }}:${{ inputs.version }}
            ${{ env.IMAGE }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"
