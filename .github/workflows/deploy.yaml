---
name: Deploy

# Publishes the image when a GitHub Release is published by a human (or a PAT).
# Releases cut by the manual Release workflow build inline there instead, because
# events from the default GITHUB_TOKEN do not cascade to trigger this workflow.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # propagated to build.yaml for keyless cosign signing

jobs:
  detect:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Read version from config.yaml
        id: v
        run: |
          version="$(grep -E '^version:' amneziawg/config.yaml \
            | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved add-on version: ${version}"

  build:
    needs: detect
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ needs.detect.outputs.version }}
    secrets: inherit
